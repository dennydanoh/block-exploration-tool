<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 / 继续</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">逛</div>
          <div>
            <div class="brand-title">账号中心</div>
            <div class="brand-subtitle">没注册过也可以直接继续</div>
          </div>
        </div>
        <nav class="nav">
          <a class="nav-pill" href="./home.html">返回首页</a>
          <a class="nav-pill" href="./profile.html">个人中心</a>
          <span class="nav-pill active">登录</span>
        </nav>
      </header>

      <section class="grid-2">
        <article class="card detail-panel">
          <div class="section-header">
            <div>
              <h1 class="section-title">登录 / 继续</h1>
            </div>
          </div>
          <p class="detail-copy" style="margin-top: 0;">
            输入手机号或邮箱后继续。如果你还没有账号，系统会自动进入首次注册流程。
          </p>
          <div class="form-grid" style="margin-top: 18px;">
            <div class="field">手机号 / 邮箱</div>
            <div class="field">密码或验证码</div>
          </div>
          <div class="action-row" style="margin-top: 18px;">
            <button class="accent-button">继续</button>
            <button class="ghost-button">使用验证码</button>
          </div>
        </article>

        <article class="card detail-panel">
          <div class="section-header">
            <div>
              <h1 class="section-title">首次使用说明</h1>
            </div>
          </div>
          <div class="info-list">
            <div class="info-row">
              <div class="info-label">已有账号</div>
              <div class="info-value">直接登录并进入你的收藏街区。</div>
            </div>
            <div class="info-row">
              <div class="info-label">没有账号</div>
              <div class="info-value">首次继续后自动补全昵称并创建账号。</div>
            </div>
            <div class="info-row">
              <div class="info-label">完成后</div>
              <div class="info-value">你可以收藏街区、查看个人中心和长期回看。</div>
            </div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
