<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人中心</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">逛</div>
          <div>
            <div class="brand-title">个人中心</div>
            <div class="brand-subtitle">管理你的收藏街区</div>
          </div>
        </div>
        <nav class="nav">
          <a class="nav-pill" href="./home.html">发现</a>
          <a class="nav-pill" href="./search.html">搜索</a>
          <span class="nav-pill active">我的收藏</span>
        </nav>
      </header>

      <section class="grid-2">
        <article class="card detail-panel">
          <div class="section-header">
            <div>
              <h1 class="section-title">Denny</h1>
              <div class="section-note">已收藏 12 个街区</div>
            </div>
          </div>
          <div class="info-list">
            <div class="info-row">
              <div class="info-label">昵称</div>
              <div class="info-value">Denny</div>
            </div>
            <div class="info-row">
              <div class="info-label">账号</div>
              <div class="info-value">denny@example.com</div>
            </div>
          </div>
          <div class="action-row" style="margin-top: 18px;">
            <button class="ghost-button">编辑资料</button>
            <button class="ghost-button">退出登录</button>
          </div>
        </article>

        <article class="card detail-panel">
          <div class="section-header">
            <div>
              <h1 class="section-title">我的收藏街区</h1>
            </div>
          </div>
          <div class="shop-list">
            <div class="shop-item">
              <div class="item-head">
                <div class="item-title">南头古城</div>
                <span class="chip active">2,468 人收藏</span>
              </div>
              <div class="item-copy">深圳 · 南山区 / 历史街区 / 咖啡多</div>
            </div>
            <div class="shop-item">
              <div class="item-head">
                <div class="item-title">鼓楼片区</div>
                <span class="chip">1,932 人收藏</span>
              </div>
              <div class="item-copy">北京 · 东城区 / 胡同漫游 / 夜逛友好</div>
            </div>
            <div class="shop-item">
              <div class="item-head">
                <div class="item-title">武康路安福路</div>
                <span class="chip">3,184 人收藏</span>
              </div>
              <div class="item-copy">上海 · 徐汇区 / 买手店 / 适合拍照</div>
            </div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
