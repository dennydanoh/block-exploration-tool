<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>搜索空状态</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">逛</div>
          <div>
            <div class="brand-title">搜索结果</div>
            <div class="brand-subtitle">没有找到完全匹配的街区</div>
          </div>
        </div>
        <nav class="nav">
          <a class="nav-pill" href="./home.html">发现</a>
          <span class="nav-pill active">无结果</span>
          <a class="nav-pill" href="./login.html">登录</a>
        </nav>
      </header>

      <section class="hero">
        <div class="search-bar" style="margin-top: 0;">
          <div class="search-input">
            <div>
              <div class="search-label">搜索关键词</div>
              <div class="search-value">深圳 某个不存在的街区</div>
            </div>
          </div>
          <button class="accent-button">重新搜索</button>
        </div>
      </section>

      <section class="section">
        <article class="card detail-panel" style="text-align: center; padding: 56px 28px;">
          <div class="eyebrow">No Results</div>
          <h1 class="section-title" style="margin-bottom: 14px;">暂时没有找到完全匹配的地点</h1>
          <p class="detail-copy" style="max-width: 720px; margin: 0 auto;">
            可以换一个更短的关键词，或者先从城市和风格标签里继续逛。
          </p>
          <div class="action-row" style="margin-top: 24px; justify-content: center;">
            <a class="accent-button" href="./home.html">返回首页</a>
            <a class="ghost-button" href="./search.html">查看推荐结果</a>
          </div>
          <div class="tag-row" style="margin-top: 26px; justify-content: center;">
            <span class="chip">深圳 咖啡街区</span>
            <span class="chip">适合拍照的街区</span>
            <span class="chip">周末半天 Citywalk</span>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
