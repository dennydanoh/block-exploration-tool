<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人中心空状态</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">逛</div>
          <div>
            <div class="brand-title">个人中心</div>
            <div class="brand-subtitle">还没有收藏任何街区</div>
          </div>
        </div>
        <nav class="nav">
          <a class="nav-pill" href="./home.html">发现</a>
          <a class="nav-pill" href="./search.html">搜索</a>
          <span class="nav-pill active">我的收藏</span>
        </nav>
      </header>

      <section class="grid-2">
        <article class="card detail-panel">
          <div class="section-header">
            <div>
              <h1 class="section-title">Denny</h1>
              <div class="section-note">已收藏 0 个街区</div>
            </div>
          </div>
          <div class="info-list">
            <div class="info-row">
              <div class="info-label">昵称</div>
              <div class="info-value">Denny</div>
            </div>
            <div class="info-row">
              <div class="info-label">账号</div>
              <div class="info-value">denny@example.com</div>
            </div>
          </div>
        </article>

        <article class="card detail-panel" style="display: grid; place-items: center; min-height: 420px; text-align: center;">
          <div>
            <div class="eyebrow">Empty Favorites</div>
            <h2 class="section-title" style="margin-bottom: 14px;">你还没有收藏街区</h2>
            <p class="detail-copy" style="max-width: 480px; margin: 0 auto;">
              先去发现页逛一圈，看到喜欢的地方就收藏起来，之后可以在这里统一回看。
            </p>
            <div class="action-row" style="margin-top: 24px; justify-content: center;">
              <a class="accent-button" href="./home.html">去发现</a>
              <a class="ghost-button" href="./search.html">去搜索</a>
            </div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
