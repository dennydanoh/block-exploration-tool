<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>移动空收藏状态</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="screen-shell">
      <main class="screen">
        <header class="topbar subpage">
          <a class="nav-back" href="./home.html">
            <span class="icon-btn"><svg class="ui-icon" aria-hidden="true"><use href="./icons.svg#i-chevron-left"></use></svg></span>
          </a>
          <div class="nav-title">我的</div>
          <div class="nav-spacer"></div>
        </header>

        <section class="page-intro">
          <div class="page-kicker">Login Required</div>
          <h1 class="page-title">需要先登录</h1>
          <div class="page-subtitle">收藏和个人信息依赖登录状态，未登录时不直接展示这些内容。</div>
        </section>

        <section class="section">
          <article class="card empty-state">
            <div>
              <div class="empty-orb"></div>
              <div class="eyebrow">Login First</div>
              <h2 class="section-title" style="margin-bottom: 12px;">登录后再查看你的收藏和账号信息</h2>
              <p class="copy" style="max-width: 300px; margin: 0 auto;">
                继续登录后，你可以收藏喜欢的街区、进入收藏页和个人中心。
              </p>
              <div class="action-row" style="justify-content: center; margin-top: 22px;">
                <a class="accent-btn" href="./login.html">
                  <svg class="ui-icon btn-icon" aria-hidden="true"><use href="./icons.svg#i-user"></use></svg>
                  <span>登录</span>
                </a>
                <a class="ghost-btn" href="./home.html">
                  <svg class="ui-icon btn-icon" aria-hidden="true"><use href="./icons.svg#i-home"></use></svg>
                  <span>返回</span>
                </a>
              </div>
            </div>
          </article>
        </section>
      </main>

      <nav class="bottom-nav">
        <a class="bottom-item" href="./home.html"><span class="nav-glyph"><svg class="ui-icon" aria-hidden="true"><use href="./icons.svg#i-home"></use></svg></span><span>发现</span></a>
        <a class="bottom-item" href="./search.html"><span class="nav-glyph"><svg class="ui-icon" aria-hidden="true"><use href="./icons.svg#i-search"></use></svg></span><span>搜索</span></a>
        <a class="bottom-item" href="./login.html"><span class="nav-glyph"><svg class="ui-icon" aria-hidden="true"><use href="./icons.svg#i-heart"></use></svg></span><span>收藏</span></a>
        <a class="bottom-item active" href="./login.html"><span class="nav-glyph"><svg class="ui-icon" aria-hidden="true"><use href="./icons.svg#i-user"></use></svg></span><span>我的</span></a>
      </nav>
    </div>
  </body>
</html>
