<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>移动404</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="screen-shell">
      <main class="screen">
        <header class="topbar subpage">
          <a class="nav-back" href="./home.html">
            <span class="icon-btn"><svg class="ui-icon" aria-hidden="true"><use href="./icons.svg#i-chevron-left"></use></svg></span>
          </a>
          <div class="nav-title">页面状态</div>
          <div class="nav-spacer"></div>
        </header>

        <section class="page-intro">
          <div class="page-kicker">Error State</div>
          <h1 class="page-title">页面未找到</h1>
          <div class="page-subtitle">链接可能失效，但你仍然可以返回首页或继续搜索。</div>
        </section>

        <section class="section">
          <article class="card empty-state">
            <div>
              <div class="empty-orb"></div>
              <div class="eyebrow">404</div>
              <h2 class="section-title" style="margin-bottom: 12px;">这个页面不见了</h2>
              <p class="copy" style="max-width: 300px; margin: 0 auto;">
                可能是链接失效，也可能是这个街区还没上线。你可以返回首页，或者继续搜索别的地方。
              </p>
              <div class="action-row" style="justify-content: center; margin-top: 22px;">
                <a class="accent-btn" href="./home.html">
                  <svg class="ui-icon btn-icon" aria-hidden="true"><use href="./icons.svg#i-home"></use></svg>
                  <span>首页</span>
                </a>
                <a class="ghost-btn" href="./search.html">
                  <svg class="ui-icon btn-icon" aria-hidden="true"><use href="./icons.svg#i-search"></use></svg>
                  <span>搜索</span>
                </a>
              </div>
            </div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
