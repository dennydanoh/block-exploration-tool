<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>移动城市页</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="screen-shell">
      <main class="screen">
        <header class="topbar subpage">
          <a class="nav-back" href="./home.html">
            <span class="icon-btn"><svg class="ui-icon" aria-hidden="true"><use href="./icons.svg#i-chevron-left"></use></svg></span>
          </a>
          <div class="nav-title">城市</div>
          <a class="icon-btn" href="./search.html" aria-label="搜索">
            <svg class="ui-icon" aria-hidden="true"><use href="./icons.svg#i-search"></use></svg>
          </a>
        </header>

        <section class="page-intro">
          <div class="page-kicker">City Guide</div>
          <h1 class="page-title">深圳</h1>
          <div class="page-subtitle">适合半天慢逛的街区，不偏传统景点，更偏街区气质和步行体验。</div>
        </section>

        <section class="hero-card">
          <h2 class="headline" style="font-size:28px;">深圳更适合逛的，不止商场。</h2>
          <p class="hero-copy">优先呈现更有街区气质、店铺密度和步行体验的片区。</p>
          <div class="tag-row" style="margin-top: 16px;">
            <span class="tag">城市更新</span>
            <span class="tag">创意园区</span>
            <span class="tag">适合傍晚</span>
          </div>
        </section>

        <section class="section">
          <div class="section-header">
            <h2 class="section-title">推荐主题</h2>
          </div>
          <div class="list">
            <div class="card list-card">
              <div class="item-title">旧城更新路线</div>
              <div class="item-copy">适合街景、巷子和小店并重的周末逛法。</div>
            </div>
            <div class="card list-card">
              <div class="item-title">咖啡慢逛路线</div>
              <div class="item-copy">更松弛，不追求密集打卡。</div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-header">
            <h2 class="section-title">深圳精选</h2>
          </div>
          <div class="list">
            <article class="card result-card">
              <div class="thumb"></div>
              <div>
                <div class="result-title">南头古城</div>
                <div class="item-copy">旧城更新 / 咖啡多 / 适合傍晚</div>
                <div class="tag-row" style="margin-top: 10px;">
                  <span class="stat-pill">2,468 人收藏</span>
                  <span class="stat-pill">3-5 小时</span>
                </div>
              </div>
            </article>
            <article class="card result-card">
              <div class="thumb" style="background: linear-gradient(145deg, #705948 0%, #c7986e 44%, #516159 100%);"></div>
              <div>
                <div class="result-title">华侨城创意园</div>
                <div class="item-copy">展览 / 设计店 / 适合白天</div>
                <div class="tag-row" style="margin-top: 10px;">
                  <span class="stat-pill">1,126 人收藏</span>
                  <span class="stat-pill">半天</span>
                </div>
              </div>
            </article>
          </div>
        </section>
      </main>

      <nav class="bottom-nav">
        <a class="bottom-item active" href="./home.html"><span class="nav-glyph"><svg class="ui-icon" aria-hidden="true"><use href="./icons.svg#i-home"></use></svg></span><span>发现</span></a>
        <a class="bottom-item" href="./search.html"><span class="nav-glyph"><svg class="ui-icon" aria-hidden="true"><use href="./icons.svg#i-search"></use></svg></span><span>搜索</span></a>
        <a class="bottom-item" href="./login.html"><span class="nav-glyph"><svg class="ui-icon" aria-hidden="true"><use href="./icons.svg#i-heart"></use></svg></span><span>收藏</span></a>
        <a class="bottom-item" href="./login.html"><span class="nav-glyph"><svg class="ui-icon" aria-hidden="true"><use href="./icons.svg#i-user"></use></svg></span><span>我的</span></a>
      </nav>
    </div>
  </body>
</html>
